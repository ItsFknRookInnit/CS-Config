<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybers Structures Pro Configurator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        
        input[type=range] { -webkit-appearance: none; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: #3b82f6; cursor: pointer; margin-top: -5px; border: 2px solid #0f172a;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px; background: #1e293b; border-radius: 2px;
        }
        
        .tooltip-container { position: relative; cursor: help; }
        .tooltip-text {
            visibility: hidden; position: absolute; z-index: 100; bottom: 125%; left: 0;
            width: 320px; background-color: #1e293b; color: #fff; padding: 12px;
            border-radius: 6px; font-size: 11px; border: 1px solid #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); opacity: 0; transition: opacity 0.2s;
            pointer-events: none; line-height: 1.5; font-family: sans-serif;
        }
        .tooltip-container:hover .tooltip-text { visibility: visible; opacity: 1; }

        .config-row:hover { background-color: rgba(59, 130, 246, 0.05); }
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        body { line-height: 1.2; overflow: hidden; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-slate-900 border-b border-slate-800 p-3 flex justify-between items-center shrink-0 shadow-md">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-1.5 rounded-lg">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight leading-none">Cybers Structures</h1>
                <p class="text-[10px] text-blue-400 uppercase font-bold tracking-tighter">Live Config Sync | Pro Edition</p>
            </div>
        </div>
        <div class="flex gap-2">
            <input type="text" id="searchInput" placeholder="Search parameters..." class="bg-slate-800 border border-slate-700 text-xs px-3 py-1.5 rounded focus:ring-1 focus:ring-blue-500 outline-none w-64">
            <button onclick="expandAll()" class="bg-slate-800 hover:bg-slate-700 text-[10px] uppercase font-bold px-3 py-1.5 rounded border border-slate-700 transition-colors">Expand All</button>
            <button onclick="collapseAll()" class="bg-slate-800 hover:bg-slate-700 text-[10px] uppercase font-bold px-3 py-1.5 rounded border border-slate-700 transition-colors">Collapse All</button>
        </div>
    </header>

    <!-- Main View -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Settings Column -->
        <div id="settingsList" class="flex-1 h-full overflow-y-auto p-4 bg-slate-950">
            <div id="loader" class="flex flex-col items-center justify-center h-full space-y-4">
                <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                <p class="text-slate-400 text-sm font-mono loading-pulse">Syncing with Master Spreadsheet...</p>
            </div>
        </div>

        <!-- Output Column -->
        <div class="w-[450px] h-full bg-slate-900 border-l border-slate-800 flex flex-col shadow-2xl">
            <div class="p-3 bg-slate-900 border-b border-slate-800 flex justify-between items-center">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Final INI (Changes Only)</h2>
                <button onclick="copyINI()" id="copyBtn" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] font-bold uppercase px-3 py-1.5 rounded transition-all flex items-center gap-2">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                    Copy Output
                </button>
            </div>
            <div class="flex-1 p-4 overflow-hidden flex flex-col">
                <textarea id="iniResult" readonly class="flex-1 w-full bg-slate-950 border border-slate-800 rounded p-4 font-mono text-[11px] text-green-400 outline-none resize-none leading-relaxed" placeholder="Modify any setting to generate your INI block..."></textarea>
                <div class="mt-4 p-3 bg-slate-800 rounded border border-slate-700">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-2">Nitrado Paste Instructions</p>
                    <p class="text-[10px] text-slate-300">1. Modify settings to generate the delta.<br>2. Copy the text block above.<br>3. Paste into <span class="text-blue-400">GameUserSettings.ini</span> under your [CybersStructures] section.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '1-gRdLIO918EoxvcQvJBLWmbY8_BbfjFsuKS3whcMDbs';
        const GID = '687105475';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

        // The user-provided list of Valid Section Headers
        const VALID_HEADERS = [
            "Air Conditioner", "AmmoBox", "AutoCrafter", "Beehive", "Beer Barrel", "Blade Wasp", 
            "Blueprint Maker", "Bookshelf", "Bunk Bed", "Campfire", "Ceiling Repulser", "Charge Injector", 
            "Charge Station", "ChemistryBench", "Cloning Chamber", "CompostBin", "Converter", "CookingPot", 
            "Crafting Station", "CropPlot Large", "CropPlot Medium", "CropPlot Small", "Cryo Fridge", 
            "Dedicated Interface", "Dedicated Storage", "Dedicated Storage Intake", "Dino Mind Wipe", 
            "Egg Incubator", "Element Catalyzer", "Fabricator", "Farmer", "Feeding Trough", "Fireplace", 
            "Forge", "Fridge", "Gacha Gavager", "Gardener", "Gas Collector", "Gene Storage", "Generator", 
            "Global", "Hatchery", "Header Name", "Healing Station", "Hitching post", "Hitching Post Tek", 
            "Incinerator", "Industrial Cooker", "Industrial Forge", "Industrial Grill", "Industrial Grinder", 
            "Item Collector", "ItemAggregator", "ItemTranslocator", "Large Storage", "Metal BookShelf", 
            "Metal Storage", "Metal Water Tap", "MiniVault", "Mortar and Pestle", "MultiTool", "Mutator", 
            "Nanny", "Oil Pump", "OmniTool", "Pod Gun", "Preserving Bin", "Propagator", "Simple Bed", 
            "Sleeping Bag", "Special Mind Wipe", "Standing Torch", "Stone Water Tap", "StorageBoxSmall", 
            "Tame Grinder", "Tek Bed", "Tek Chembench", "Tek Cloning Terminal", "Tek Cooking Pot", 
            "Tek Crop Plot", "Tek Forcefield", "Tek Forge", "Tek Fridge", "Tek Generator", "Tek Light", 
            "Tek Stove", "Tek Transmitter", "Tek Trough", "TekReplicator", "TekStorage", "TekTreeSapTap", 
            "Tesla Coil", "TransferControlUnit", "Transmutator", "Tree Sap Tap", "Tribe Tower", 
            "Tribute Terminal", "Turret Auto", "Turret Ballista", "Turret Catapult", "Turret Heavy", 
            "Turret MiniGun", "Turret Rocket", "Turret Tek", "Vault", "Vivarium", "Wall Torch", "Wind Turbine"
        ].map(h => h.toLowerCase());

        let fullData = [];
        let state = {};
        let defaultValues = {};

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                const rows = json.table.rows;
                const categoriesMap = {};
                let currentCategoryName = "GLOBAL"; 

                rows.forEach(row => {
                    if (!row.c) return;
                    
                    const colA = row.c[0] ? String(row.c[0].v).trim() : "";
                    const colB = row.c[1] ? String(row.c[1].v).trim() : "";

                    if (!colA) return;

                    const colALower = colA.toLowerCase();

                    // Logic: If Column A is in our VALID_HEADERS list, switch category
                    if (VALID_HEADERS.includes(colALower)) {
                        currentCategoryName = colA.toUpperCase();
                        return;
                    }

                    // Otherwise, if it's a setting (it should have a description in Col B)
                    // or if it looks like a setting (contains '=')
                    if (colB || colA.includes("=")) {
                        let key = colA;
                        let defValueString = "";

                        if (colA.includes("=")) {
                            const parts = colA.split("=");
                            key = parts[0].trim();
                            defValueString = parts[1].trim();
                        }

                        let type = 'num';
                        let parsedDef = defValueString;
                        const lowerDef = defValueString.toLowerCase();

                        if (lowerDef === 'true' || lowerDef === 'false') {
                            type = 'bool';
                            parsedDef = (lowerDef === 'true');
                        } else if (defValueString === "" || isNaN(defValueString)) {
                            type = 'text';
                        } else {
                            parsedDef = parseFloat(defValueString);
                        }

                        if (!categoriesMap[currentCategoryName]) {
                            categoriesMap[currentCategoryName] = { category: currentCategoryName, settings: [] };
                        }

                        categoriesMap[currentCategoryName].settings.push({ 
                            key, 
                            type, 
                            def: parsedDef, 
                            desc: colB || "No description provided." 
                        });

                        state[key] = parsedDef;
                        defaultValues[key] = parsedDef;
                    }
                });

                // Convert Map to Array and Sort
                fullData = Object.values(categoriesMap).sort((a, b) => {
                    // PIN GLOBAL TO TOP
                    const aIsGlobal = a.category.includes("GLOBAL");
                    const bIsGlobal = b.category.includes("GLOBAL");
                    if (aIsGlobal && !bIsGlobal) return -1;
                    if (!aIsGlobal && bIsGlobal) return 1;
                    return a.category.localeCompare(b.category);
                });

                // Sort settings within categories alphabetically
                fullData.forEach(cat => {
                    cat.settings.sort((a, b) => a.key.localeCompare(b.key));
                });

                render();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('loader').innerHTML = `<p class="text-red-500 font-bold">Failed to load live data. Please check your connection.</p>`;
            }
        }

        function render() {
            const container = document.getElementById('settingsList');
            container.innerHTML = '';

            fullData.forEach((cat) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'mb-3 bg-slate-900 border border-slate-800 rounded-lg overflow-hidden cat-wrapper shadow-sm';

                const header = document.createElement('div');
                header.className = 'p-3 bg-slate-800 cursor-pointer flex justify-between items-center hover:bg-slate-700 transition-colors border-b border-slate-700';
                header.onclick = () => toggleCat(catDiv);
                header.innerHTML = `
                    <h3 class="text-[10px] font-bold uppercase tracking-widest text-blue-400">${cat.category}</h3>
                    <svg class="w-4 h-4 text-slate-500 transition-transform chevron rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                `;
                catDiv.appendChild(header);

                const body = document.createElement('div');
                body.className = 'p-2 space-y-1 cat-content';

                cat.settings.forEach(s => {
                    const row = document.createElement('div');
                    row.className = 'flex items-center justify-between p-2 rounded-md config-row transition-colors border-b border-slate-800 last:border-0';
                    row.dataset.key = s.key.toLowerCase();

                    const info = document.createElement('div');
                    info.className = 'tooltip-container flex items-center gap-2';
                    info.innerHTML = `
                        <span class="text-xs font-mono text-slate-300">${s.key}</span>
                        <div class="tooltip-text">${s.desc}</div>
                    `;
                    row.appendChild(info);

                    const control = document.createElement('div');
                    control.className = 'flex items-center gap-4 w-48 justify-end';

                    if (s.type === 'bool') {
                        control.innerHTML = `
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="sr-only peer" ${state[s.key] ? 'checked' : ''} onchange="updateVal('${s.key}', this.checked)">
                                <div class="w-8 h-4 bg-slate-700 rounded-full peer peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-3 after:w-3 after:transition-all peer-checked:after:translate-x-4 shadow-inner"></div>
                            </label>
                        `;
                    } else if (s.type === 'num') {
                        const currentVal = state[s.key];
                        const def = typeof s.def === 'number' ? s.def : 0;
                        const maxVal = def === 0 ? 100 : Math.max(100, def * 5);
                        const step = def % 1 !== 0 ? 0.1 : 1;
                        control.innerHTML = `
                            <input type="range" class="flex-1 h-1 bg-slate-700 rounded-lg cursor-pointer" min="0" max="${maxVal}" step="${step}" value="${currentVal}" oninput="syncNum(this, '${s.key}')">
                            <input type="number" class="w-14 bg-slate-800 border border-slate-700 text-[10px] py-1 px-1 rounded text-center font-mono focus:border-blue-500 outline-none" value="${currentVal}" step="${step}" oninput="syncRange(this, '${s.key}')">
                        `;
                    } else {
                        control.innerHTML = `
                            <input type="text" class="w-full bg-slate-800 border border-slate-700 text-[10px] py-1 px-2 rounded font-mono focus:border-blue-500 outline-none" value="${state[s.key]}" oninput="updateVal('${s.key}', this.value)">
                        `;
                    }

                    row.appendChild(control);
                    body.appendChild(row);
                });

                catDiv.appendChild(body);
                container.appendChild(catDiv);
            });
            updateINI();
        }

        function syncNum(range, key) {
            range.nextElementSibling.value = range.value;
            updateVal(key, parseFloat(range.value));
        }

        function syncRange(num, key) {
            num.previousElementSibling.value = num.value;
            updateVal(key, parseFloat(num.value));
        }

        function updateVal(key, val) {
            state[key] = val;
            updateINI();
        }

        function updateINI() {
            let out = "[CybersStructures]\n";
            let changed = false;

            const sortedKeys = Object.keys(state).sort();
            sortedKeys.forEach(key => {
                if (state[key] !== defaultValues[key]) {
                    out += `${key}=${state[key]}\n`;
                    changed = true;
                }
            });

            const el = document.getElementById('iniResult');
            el.value = changed ? out.trim() : "";
        }

        function toggleCat(el) {
            const content = el.querySelector('.cat-content');
            const chev = el.querySelector('.chevron');
            content.classList.toggle('hidden');
            chev.classList.toggle('rotate-180');
        }

        function expandAll() {
            document.querySelectorAll('.cat-content').forEach(c => c.classList.remove('hidden'));
            document.querySelectorAll('.chevron').forEach(c => c.classList.add('rotate-180'));
        }

        function collapseAll() {
            document.querySelectorAll('.cat-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.chevron').forEach(c => c.classList.remove('rotate-180'));
        }

        function copyINI() {
            const textarea = document.getElementById('iniResult');
            if(!textarea.value) return;
            textarea.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('copyBtn');
            const old = btn.innerHTML;
            btn.textContent = 'Copied!';
            btn.classList.replace('bg-blue-600', 'bg-green-600');
            setTimeout(() => {
                btn.innerHTML = old;
                btn.classList.replace('bg-green-600', 'bg-blue-600');
            }, 1500);
        }

        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.config-row').forEach(row => {
                const visible = row.dataset.key.includes(term);
                row.style.display = visible ? 'flex' : 'none';
            });
            document.querySelectorAll('.cat-wrapper').forEach(cat => {
                const hasVisible = Array.from(cat.querySelectorAll('.config-row')).some(r => r.style.display !== 'none');
                cat.style.display = hasVisible ? 'block' : 'none';
                if(term && hasVisible) {
                    cat.querySelector('.cat-content').classList.remove('hidden');
                    cat.querySelector('.chevron').classList.add('rotate-180');
                }
            });
        };

        fetchSheetData();
    </script>
</body>
</html>
