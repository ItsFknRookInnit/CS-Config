<body class="h-screen flex flex-col p-2 md:p-4 gap-3">

                <h1 class="ark-header-font text-4xl md:text-6xl text-[var(--ark-cyan)] tracking-widest leading-none drop-shadow-[0_0_10px_rgba(92,225,230,0.4)]">CYBERS STRUCTURES</h1>

    <script>
        const SHEET_ID = '1-gRdLIO918EoxvcQvJBLWmbY8_BbfjFsuKS3whcMDbs';
        const GID = '687105475';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

        let fullData = [];
        let state = {};
        let defaultValues = {};

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3500);
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                
                const rows = json.table.rows;
                const categoriesMap = {};
                let currentCategoryName = "GLOBAL CONFIG"; 

                rows.forEach(row => {
                    if (!row.c) return;
                    const colA = row.c[0] ? String(row.c[0].v).trim() : "";
                    const colB = row.c[1] ? String(row.c[1].v).trim() : "";
                    if (!colA) return;
                    
                    if (colA.toLowerCase() === "header name" || colA.toLowerCase() === "cybersstructures") return;

                    // Header Detection
                    if (!colA.includes("=") && !colB) {
                        currentCategoryName = colA.toUpperCase();
                        return;
                    }

                    let key = colA;
                    let defValueString = "";
                    if (colA.includes("=")) {
                        const parts = colA.split("=");
                        key = parts[0].trim();
                        defValueString = parts.slice(1).join("=").trim();
                    }

                    let type = 'num';
                    let parsedDef = defValueString;
                    const lowerDef = defValueString.toLowerCase();

                    if (lowerDef === 'true' || lowerDef === 'false') {
                        type = 'bool';
                        parsedDef = (lowerDef === 'true');
                    } else if (defValueString === "" || isNaN(defValueString)) {
                        type = 'text';
                    } else {
                        parsedDef = parseFloat(defValueString);
                    }

                    if (!categoriesMap[currentCategoryName]) {
                        categoriesMap[currentCategoryName] = { category: currentCategoryName, settings: [] };
                    }

                    categoriesMap[currentCategoryName].settings.push({ 
                        key, type, def: parsedDef, desc: colB || "SYSTEM DATA CLASSIFIED. NO DESCRIPTION AVAILABLE." 
                    });
                    state[key] = parsedDef;
                    defaultValues[key] = parsedDef;
                });

                fullData = Object.values(categoriesMap).sort((a, b) => {
                    if (a.category.includes("GLOBAL")) return -1;
                    if (b.category.includes("GLOBAL")) return 1;
                    return a.category.localeCompare(b.category);
                });

                render();
            } catch (error) {
                document.getElementById('loader').innerHTML = `<p class="ark-header-font text-3xl text-red-500">CONNECTION INTERRUPTED</p>`;
            }
        }

        function render() {
            const container = document.getElementById('settingsList');
            container.innerHTML = '';

            fullData.forEach((cat) => {
                const catDiv = document.createElement('div');
                catDiv.className = 'mb-3 border border-[rgba(92,225,230,0.2)] bg-black/20 cat-wrapper';

                const header = document.createElement('div');
                header.className = 'p-4 bg-black/40 cursor-pointer flex justify-between items-center hover:bg-[var(--ark-cyan-dark)]/40 transition-all border-b border-[rgba(92,225,230,0.1)]';
                header.onclick = () => toggleCat(catDiv);
                header.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-1 h-6 bg-[var(--ark-cyan)]"></div>
                        <h3 class="ark-header-font text-2xl tracking-widest text-[var(--ark-cyan)]">${cat.category}</h3>
                    </div>
                    <svg class="w-6 h-6 text-[var(--ark-cyan-dim)] transition-transform chevron" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                `;
                catDiv.appendChild(header);

                const body = document.createElement('div');
                body.className = 'p-2 space-y-1 cat-content hidden';

                cat.settings.forEach(s => {
                    const row = document.createElement('div');
                    row.className = 'flex flex-col md:flex-row md:items-center justify-between p-3 config-row gap-4';
                    row.dataset.key = s.key.toLowerCase();

                    const info = document.createElement('div');
                    info.className = 'tooltip-trigger flex items-center gap-4 flex-1 relative';
                    info.innerHTML = `
                        <div class="w-2 h-2 bg-[var(--ark-cyan-dark)]"></div>
                        <span class="text-lg font-bold tracking-wide">${s.key}</span>
                        <div class="tooltip-text">${s.desc}</div>
                    `;
                    row.appendChild(info);

                    const control = document.createElement('div');
                    control.className = 'flex items-center gap-5 w-full md:w-80 shrink-0 md:justify-end';

                    if (s.type === 'bool') {
                        control.innerHTML = `
                            <label class="ark-check-container">
                                <input type="checkbox" class="sr-only" ${state[s.key] ? 'checked' : ''} onchange="updateVal('${s.key}', this.checked)">
                                <div class="ark-check-mark"></div>
                            </label>
                        `;
                    } else if (s.type === 'num') {
                        const currentVal = state[s.key];
                        const def = typeof s.def === 'number' ? s.def : 0;
                        const maxVal = def === 0 ? 100 : Math.max(100, def * 4);
                        const step = def % 1 !== 0 ? 0.01 : 1;
                        control.innerHTML = `
                            <input type="range" class="flex-1" min="0" max="${maxVal}" step="${step}" value="${currentVal}" oninput="syncNum(this, '${s.key}')">
                            <input type="number" class="ark-input w-24 text-center py-1 font-bold text-xl" value="${currentVal}" step="${step}" oninput="syncRange(this, '${s.key}')">
                        `;
                    } else {
                        control.innerHTML = `
                            <input type="text" class="ark-input w-full py-1.5 px-3 text-lg font-bold" value="${state[s.key]}" oninput="updateVal('${s.key}', this.value)">
                        `;
                    }

                    row.appendChild(control);
                    body.appendChild(row);
                });

                catDiv.appendChild(body);
                container.appendChild(catDiv);
            });
            updateINI();
        }

        function syncNum(range, key) {
            range.nextElementSibling.value = range.value;
            updateVal(key, parseFloat(range.value));
        }

        function syncRange(num, key) {
            num.previousElementSibling.value = num.value;
            updateVal(key, parseFloat(num.value));
        }

        function updateVal(key, val) {
            state[key] = val;
            updateINI();
        }

        function updateINI() {
            let out = "[CybersStructures]\n";
            let changed = false;
            Object.keys(state).sort().forEach(key => {
                if (state[key] !== defaultValues[key]) {
                    out += `${key}=${state[key]}\n`;
                    changed = true;
                }
            });
            document.getElementById('iniResult').value = changed ? out.trim() : "";
        }

        function toggleCat(el) {
            const content = el.querySelector('.cat-content');
            const chev = el.querySelector('.chevron');
            content.classList.toggle('hidden');
            chev.classList.toggle('rotate-180');
        }

        function expandAll() {
            document.querySelectorAll('.cat-content').forEach(c => c.classList.remove('hidden'));
            document.querySelectorAll('.chevron').forEach(c => c.classList.add('rotate-180'));
        }

        function collapseAll() {
            document.querySelectorAll('.cat-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.chevron').forEach(c => c.classList.remove('rotate-180'));
        }

        function copyINI() {
            const textarea = document.getElementById('iniResult');
            if(!textarea.value) return;
            textarea.select();
            document.execCommand('copy');
            showToast("DATA SEQUENCE COPIED");
        }

        function resetToDefaults() {
            for (let key in state) state[key] = defaultValues[key];
            render();
            showToast("TERMINAL PURGED // DEFAULTS RESTORED");
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const contents = e.target.result;
                const lines = contents.split(/\r?\n/);
                let inSection = false;
                let matches = 0;
                for (let line of lines) {
                    line = line.trim();
                    if (line.toLowerCase() === '[cybersstructures]') { inSection = true; continue; }
                    if (inSection && line.startsWith('[') && line.endsWith(']')) break;
                    if (inSection && line.includes('=')) {
                        const [k, ...v] = line.split('=');
                        const key = k.trim();
                        const val = v.join('=').trim();
                        if (state.hasOwnProperty(key)) {
                            const type = typeof defaultValues[key];
                            if (type === 'boolean') state[key] = (val.toLowerCase() === 'true');
                            else if (type === 'number') state[key] = parseFloat(val) || 0;
                            else state[key] = val;
                            matches++;
                        }
                    }
                }
                if (matches > 0) {
                    render();
                    showToast(`REMOTE DATA SYNCED: ${matches} NODES`);
                } else showToast("ENCRYPTION ERROR: NO VALID SECTION");
                document.getElementById('iniUpload').value = "";
            };
            reader.readAsText(file);
        }

        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.config-row').forEach(row => {
                row.style.display = row.dataset.key.includes(term) ? 'flex' : 'none';
            });
            document.querySelectorAll('.cat-wrapper').forEach(cat => {
                const hasVisible = Array.from(cat.querySelectorAll('.config-row')).some(r => r.style.display !== 'none');
                cat.style.display = hasVisible ? 'block' : 'none';
                if(term && hasVisible) {
                    cat.querySelector('.cat-content').classList.remove('hidden');
                    cat.querySelector('.chevron').classList.add('rotate-180');
                }
            });
        };

        fetchSheetData();
    </script>
</body>
</html> -->
