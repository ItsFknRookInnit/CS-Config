<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybers Structures Pro Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Teko:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ark-cyan: #5ce1e6;
            --ark-cyan-dim: rgba(92, 225, 230, 0.4);
            --ark-cyan-dark: #113a42;
            --ark-bg-base: #02080a;
            --ark-bg-panel: rgba(6, 22, 28, 0.92);
            --ark-border-glow: 0 0 15px rgba(92, 225, 230, 0.2);
        }

        body {
            font-family: 'Roboto Condensed', sans-serif;
            background-color: var(--ark-bg-base);
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(2, 8, 10, 0.95) 100%),
                url("data:image/svg+xml,%3Csvg width='60' height='104' viewBox='0 0 60 104' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M60 26L30 41L0 26V11L30-4L60 11V26zM30 95L0 80V65L30 50L60 65V80L30 95z' fill='%235ce1e6' fill-opacity='0.03' fill-rule='evenodd'/%3E");
            background-attachment: fixed;
            color: #e2f8fa;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .ark-header-font { font-family: 'Teko', sans-serif; text-transform: uppercase; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar-thumb { background: var(--ark-cyan-dark); border: 1px solid var(--ark-cyan-dim); }

        .ark-panel {
            background: var(--ark-bg-panel);
            border: 1px solid rgba(92, 225, 230, 0.2);
            box-shadow: var(--ark-border-glow);
            isolation: isolate;
            position: relative;
            z-index: 1;
        }

        .ark-panel::before {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: -1;
            pointer-events: none;
        }

        .ark-btn {
            background: rgba(17, 58, 66, 0.6);
            border: 1px solid var(--ark-cyan);
            color: var(--ark-cyan);
            font-family: 'Teko', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.1s ease;
        }
        .ark-btn:hover {
            background: var(--ark-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--ark-cyan);
        }

        .ark-input {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(92, 225, 230, 0.3);
            color: #fff;
            padding: 4px 12px;
        }

        .ark-check-container {
            width: 24px; height: 24px;
            background: #000;
            border: 1px solid var(--ark-cyan-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform;
        }
        .ark-check-mark {
            width: 14px; height: 14px;
            transition: background 0.1s;
        }
        input:checked + .ark-check-mark {
            background: var(--ark-cyan);
            box-shadow: 0 0 10px var(--ark-cyan);
        }

        .config-row {
            border-bottom: 1px solid rgba(92, 225, 230, 0.05);
            contain: content;
        }

        /* FIXED TOOLTIP: Escapes stacking context */
        #globalTooltip {
            position: fixed;
            z-index: 99999;
            pointer-events: none;
            display: none;
            max-width: 320px;
            background: #010a0d;
            color: #fff;
            padding: 15px;
            border: 1px solid var(--ark-cyan);
            border-left: 5px solid var(--ark-cyan);
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            font-size: 14px;
            line-height: 1.4;
        }

        #toast {
            position: fixed; top: 40px; right: -500px; transition: right 0.3s ease;
            z-index: 9999; background: #05161c; border-left: 6px solid var(--ark-cyan);
            padding: 20px 40px; border: 1px solid rgba(92, 225, 230, 0.5);
        }
        #toast.show { right: 40px; }
    </style>
</head>
<body class="p-4 gap-4">

    <div id="globalTooltip"></div>

    <div id="toast" class="ark-header-font text-2xl tracking-widest text-white shadow-2xl">
        <span id="toastMessage">SYSTEM READY</span>
    </div>

    <header class="ark-panel p-5 flex flex-col xl:flex-row justify-between items-center gap-6 shrink-0">
        <div class="flex items-center gap-6">
            <div class="border-2 border-[var(--ark-cyan)] p-2">
                <svg class="w-10 h-10 text-[var(--ark-cyan)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
            </div>
            <div>
                <h1 class="ark-header-font text-5xl text-[var(--ark-cyan)] tracking-widest leading-none">CYBERS STRUCTURES</h1>
                <p class="ark-header-font text-lg text-[var(--ark-cyan-dim)] tracking-[0.4em] leading-none mt-1">ADVANCED TERMINAL INTERFACE</p>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-4 w-full xl:w-auto">
            <input type="text" id="searchInput" placeholder="SEARCH SYSTEM..." class="ark-input ark-header-font text-xl px-4 py-3 w-full md:w-80 tracking-widest">
            <button onclick="document.getElementById('iniUpload').click()" class="ark-btn px-10 py-3 text-2xl">IMPORT</button>
            <button onclick="resetToDefaults()" class="ark-btn px-10 py-3 text-2xl !border-red-500 !text-red-500 hover:!bg-red-600 hover:!text-black">RESET</button>
        </div>
    </header>

    <input type="file" id="iniUpload" class="hidden" onchange="handleFileUpload(event)">

    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden gap-4">
        <div class="flex-1 ark-panel flex flex-col overflow-hidden">
            <div class="bg-black/50 p-4 flex justify-between items-center border-b border-[var(--ark-cyan-dim)]">
                <h2 class="ark-header-font text-3xl text-[var(--ark-cyan)] tracking-widest flex items-center gap-3">
                    <span class="w-4 h-4 bg-[var(--ark-cyan)] inline-block"></span> STRUCTURE PROTOCOLS
                </h2>
                <div class="flex gap-2">
                    <button onclick="expandAll()" class="ark-btn px-4 py-1 text-sm">EXPAND ALL</button>
                    <button onclick="collapseAll()" class="ark-btn px-4 py-1 text-sm">COLLAPSE ALL</button>
                </div>
            </div>
            
            <div id="settingsList" class="flex-1 overflow-y-auto p-4">
                <div id="loader" class="flex flex-col items-center justify-center h-full gap-4">
                    <div class="w-12 h-12 border-4 border-[var(--ark-cyan)] border-t-transparent animate-spin"></div>
                    <p class="ark-header-font text-2xl text-[var(--ark-cyan)] tracking-widest">ESTABLISHING UPLINK...</p>
                </div>
            </div>
        </div>

        <div class="w-full lg:w-[450px] flex flex-col gap-4">
            <div class="flex-1 ark-panel flex flex-col overflow-hidden">
                <div class="bg-black/50 p-4 border-b border-[var(--ark-cyan-dim)] flex justify-between items-center">
                    <h2 class="ark-header-font text-2xl text-[var(--ark-cyan)] tracking-widest">INI OUTPUT</h2>
                    <button onclick="copyINI()" class="ark-btn px-4 py-1 text-lg">COPY</button>
                </div>
                <textarea id="iniResult" readonly class="flex-1 w-full bg-black/20 p-5 font-mono text-sm text-[var(--ark-cyan)] outline-none resize-none" placeholder="[CybersStructures]"></textarea>
            </div>
            
            <div class="ark-panel p-5">
                <h3 class="ark-header-font text-xl text-[var(--ark-cyan)] border-b border-[var(--ark-cyan-dim)] mb-3 pb-1">TERMINAL LOG</h3>
                <div class="font-mono text-xs text-[var(--ark-cyan-dim)] space-y-1">
                    <p id="log-auth">> AUTHENTICATION: SUCCESS</p>
                    <p id="log-status">> STATUS: OPERATIONAL</p>
                    <p id="log-layer">> LAYER ISOLATION: ACTIVE</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SHEET_ID = '1-gRdLIO918EoxvcQvJBLWmbY8_BbfjFsuKS3whcMDbs';
        const GID = '687105475';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

        let fullData = [];
        let state = {};
        let defaultValues = {};

        const tooltipEl = document.getElementById('globalTooltip');

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function fetchSheetData() {
            try {
                const response = await fetch(SHEET_URL);
                if (!response.ok) throw new Error("Network Response Fail");
                const text = await response.text();
                const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                if (!match) throw new Error("JSON Parse Error");
                
                const json = JSON.parse(match[1]);
                const rows = json.table.rows;
                const categoriesMap = {};
                let currentCat = "GENERAL";

                rows.forEach(row => {
                    if (!row.c) return;
                    const valA = row.c[0] ? String(row.c[0].v).trim() : "";
                    const valB = row.c[1] ? String(row.c[1].v).trim() : "";
                    
                    if (!valA || valA.toLowerCase().includes("header")) return;

                    if (!valA.includes("=") && !valB) {
                        currentCat = valA.toUpperCase();
                        return;
                    }

                    let key = valA;
                    let defStr = "";
                    if (valA.includes("=")) {
                        const parts = valA.split("=");
                        key = parts[0].trim();
                        defStr = parts.slice(1).join("=").trim();
                    }

                    let type = 'num';
                    let parsed = defStr;
                    if (defStr.toLowerCase() === 'true' || defStr.toLowerCase() === 'false') {
                        type = 'bool';
                        parsed = (defStr.toLowerCase() === 'true');
                    } else if (defStr === "" || isNaN(defStr)) {
                        type = 'text';
                    } else {
                        parsed = parseFloat(defStr);
                    }

                    if (!categoriesMap[currentCat]) categoriesMap[currentCat] = { name: currentCat, settings: [] };
                    categoriesMap[currentCat].settings.push({ key, type, def: parsed, desc: valB });
                    state[key] = parsed;
                    defaultValues[key] = parsed;
                });

                fullData = Object.values(categoriesMap);
                render();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = '<p class="text-red-500">UPLINK SYNCHRONIZATION FAILED</p>';
            }
        }

        function render() {
            const list = document.getElementById('settingsList');
            list.innerHTML = '';

            fullData.forEach(cat => {
                const wrapper = document.createElement('div');
                wrapper.className = 'mb-4 border border-[rgba(92,225,230,0.1)] bg-black/20 cat-block';
                
                const h = document.createElement('div');
                h.className = 'p-4 bg-black/40 cursor-pointer hover:bg-[var(--ark-cyan-dark)]/30 flex justify-between items-center transition-colors';
                h.onclick = () => {
                    const content = wrapper.querySelector('.cat-content');
                    content.classList.toggle('hidden');
                };
                h.innerHTML = `<span class="ark-header-font text-2xl text-[var(--ark-cyan)] tracking-widest">${cat.name}</span>`;
                wrapper.appendChild(h);

                const body = document.createElement('div');
                body.className = 'cat-content hidden';

                cat.settings.forEach(s => {
                    const row = document.createElement('div');
                    row.className = 'config-row flex flex-col md:flex-row md:items-center justify-between p-4 gap-4';
                    row.dataset.key = s.key.toLowerCase();

                    // Setup Tooltip Listeners
                    const nameWrap = document.createElement('div');
                    nameWrap.className = 'flex-1 cursor-help';
                    nameWrap.innerHTML = `<span class="text-lg font-bold text-gray-200">${s.key}</span>`;
                    
                    nameWrap.onmouseenter = (e) => {
                        tooltipEl.innerHTML = `<strong>${s.key}</strong><br><br>${s.desc || 'Protocol description not found.'}`;
                        tooltipEl.style.display = 'block';
                    };
                    nameWrap.onmousemove = (e) => {
                        const x = e.clientX + 15;
                        const y = e.clientY + 15;
                        // Prevent tooltip from overflowing screen
                        const spaceRight = window.innerWidth - x;
                        tooltipEl.style.left = spaceRight < 350 ? `${x - 340}px` : `${x}px`;
                        tooltipEl.style.top = `${y}px`;
                    };
                    nameWrap.onmouseleave = () => {
                        tooltipEl.style.display = 'none';
                    };

                    const controls = document.createElement('div');
                    controls.className = 'flex items-center gap-4 w-full md:w-64 justify-end';
                    controls.innerHTML = renderControl(s);

                    row.appendChild(nameWrap);
                    row.appendChild(controls);
                    body.appendChild(row);
                });

                wrapper.appendChild(body);
                list.appendChild(wrapper);
            });
            updateINI();
        }

        function renderControl(s) {
            if (s.type === 'bool') {
                return `
                    <label class="ark-check-container">
                        <input type="checkbox" class="hidden" ${state[s.key] ? 'checked' : ''} onchange="updateVal('${s.key}', this.checked)">
                        <div class="ark-check-mark"></div>
                    </label>
                `;
            } else if (s.type === 'num') {
                return `<input type="number" class="ark-input w-full text-right font-bold" value="${state[s.key]}" oninput="updateVal('${s.key}', parseFloat(this.value))">`;
            }
            return `<input type="text" class="ark-input w-full font-bold" value="${state[s.key]}" oninput="updateVal('${s.key}', this.value)">`;
        }

        function updateVal(key, val) {
            state[key] = val;
            updateINI();
        }

        function updateINI() {
            let out = "[CybersStructures]\n";
            let changed = false;
            Object.keys(state).sort().forEach(k => {
                if (state[k] !== defaultValues[k]) {
                    out += `${k}=${state[k]}\n`;
                    changed = true;
                }
            });
            document.getElementById('iniResult').value = changed ? out.trim() : "[CybersStructures]";
        }

        function expandAll() { document.querySelectorAll('.cat-content').forEach(c => c.classList.remove('hidden')); }
        function collapseAll() { document.querySelectorAll('.cat-content').forEach(c => c.classList.add('hidden')); }

        function resetToDefaults() {
            state = {...defaultValues};
            render();
            showToast("DEFAULTS RESTORED");
        }

        function copyINI() {
            const el = document.getElementById('iniResult');
            el.select();
            document.execCommand('copy');
            showToast("CONFIG COPIED");
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                let found = 0;
                lines.forEach(l => {
                    if (l.includes('=')) {
                        const [k, v] = l.split('=');
                        const key = k.trim();
                        if (state.hasOwnProperty(key)) {
                            const val = v.trim().toLowerCase();
                            if (val === 'true') state[key] = true;
                            else if (val === 'false') state[key] = false;
                            else if (!isNaN(val)) state[key] = parseFloat(val);
                            else state[key] = v.trim();
                            found++;
                        }
                    }
                });
                render();
                showToast(`IMPORTED ${found} PARAMETERS`);
            };
            reader.readAsText(file);
        }

        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.config-row').forEach(row => {
                row.style.display = row.dataset.key.includes(term) ? 'flex' : 'none';
            });
            document.querySelectorAll('.cat-block').forEach(cat => {
                const hasMatch = Array.from(cat.querySelectorAll('.config-row')).some(r => r.style.display !== 'none');
                cat.style.display = hasMatch ? 'block' : 'none';
                if (term && hasMatch) cat.querySelector('.cat-content').classList.remove('hidden');
            });
        };

        fetchSheetData();
    </script>
</body>
</html>
